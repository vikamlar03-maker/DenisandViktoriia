<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Denis & Viktoriia</title>

  <style>
    :root {
      --bg-main: #EBEBEB;
      --bg-blue: #92A4BD;
      --text-dark: #111111;
      --text-soft: #2d2d2d;
      --white: #ffffff;
      --line: rgba(17, 17, 17, 0.22);
      --card: rgba(255, 255, 255, 0.36);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius-lg: 28px;
      --radius-md: 20px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-dark);
      font-family: "Times New Roman", Georgia, serif;
      overflow-x: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    button,
    input {
      font: inherit;
    }

    .site {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 1s ease, transform 1s ease;
      pointer-events: none;
    }

    .site.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Заставка */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 1s ease, visibility 1s ease, filter 1s ease;
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      filter: blur(10px);
    }

    .intro-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      padding: 24px;
      text-align: center;
    }

    .intro-title {
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1.12;
      letter-spacing: 0.02em;
      color: var(--text-dark);
      margin: 0;
      font-weight: 400;
    }

    .intro-sub {
      margin-top: 18px;
      font-size: 15px;
      letter-spacing: 0.12em;
      color: rgba(17, 17, 17, 0.72);
      text-transform: uppercase;
    }

    .flower {
      position: absolute;
      opacity: 0;
      animation: bloom 2.8s ease forwards;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.06));
    }

    .flower svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .flower.left-top {
      width: 160px;
      top: -10px;
      left: -20px;
      transform-origin: bottom right;
      animation-delay: 0.2s;
    }

    .flower.right-top {
      width: 190px;
      top: -8px;
      right: -26px;
      transform-origin: bottom left;
      animation-delay: 0.6s;
    }

    .flower.left-bottom {
      width: 180px;
      left: -26px;
      bottom: -18px;
      transform-origin: top right;
      animation-delay: 0.9s;
    }

    .flower.right-bottom {
      width: 170px;
      right: -18px;
      bottom: -16px;
      transform-origin: top left;
      animation-delay: 1.2s;
    }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: scale(0.7) rotate(-8deg) translateY(30px);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg) translateY(0);
      }
    }

    /* Общие секции */
    .section-image {
      width: 100%;
      background: var(--bg-main);
    }

    .section-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Блок таймера */
    .timing-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background:
        linear-gradient(rgba(235, 235, 235, 0.10), rgba(235, 235, 235, 0.10)),
        url("Taiming.jpg") center center / cover no-repeat;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 18px 42px;
      overflow: hidden;
    }

    .timing-overlay {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #111;
    }

    .timing-title {
      margin: 0 0 18px;
      font-size: clamp(24px, 7vw, 50px);
      line-height: 1.18;
      font-weight: 400;
      max-width: 760px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.12);
    }

    .countdown {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      align-items: stretch;
      margin-top: 14px;
      padding: 10px 0;
    }

    .count-item {
      position: relative;
      padding: 12px 8px;
    }

    .count-item:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 18%;
      width: 1.5px;
      height: 64%;
      background: rgba(17,17,17,0.28);
    }

    .count-num {
      font-size: clamp(36px, 9vw, 76px);
      line-height: 1;
      margin-bottom: 8px;
      font-weight: 400;
    }

    .count-label {
      font-size: clamp(15px, 3.2vw, 24px);
      letter-spacing: 0.04em;
      color: rgba(17,17,17,0.88);
    }

    /* Синий блок */
    .blue-wrap {
      background: var(--bg-blue);
      padding: 42px 18px 56px;
    }

    .form-section {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .form-title {
      margin: 0 0 26px;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 400;
      color: #111;
    }

    .form-card {
      background: rgba(255,255,255,0.38);
      border-radius: 34px;
      padding: 26px 18px 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .field {
      width: 100%;
      height: 68px;
      border-radius: 24px;
      border: 1.6px solid rgba(17,17,17,0.22);
      background: rgba(255,255,255,0.20);
      padding: 0 22px;
      font-size: 22px;
      color: #111;
      outline: none;
      margin-bottom: 22px;
    }

    .field::placeholder {
      color: rgba(17,17,17,0.42);
    }

    .radio-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px;
      margin: 8px 0 22px;
      flex-wrap: wrap;
    }

    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: #111;
    }

    .radio-label input[type="radio"] {
      width: 28px;
      height: 28px;
      accent-color: #ffffff;
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 6px;
      min-width: 220px;
      height: 68px;
      padding: 0 32px;
      border: none;
      border-radius: 999px;
      background: #496e9f;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }

    .group-section {
      max-width: 860px;
      margin: 48px auto 0;
      text-align: center;
    }

    .group-title {
      margin: 0 0 16px;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 400;
      color: #111;
    }

    .group-link {
      display: inline-block;
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      font-size: clamp(26px, 5vw, 42px);
      line-height: 1.3;
      opacity: 0.95;
      pointer-events: none; /* пока мёртвая */
      cursor: default;
    }

    /* Подсказка о музыке */
    .music-note {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 50;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: #111;
      font-size: 13px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .music-note.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .timing-section {
        min-height: 86vh;
        padding-top: 42px;
        padding-bottom: 30px;
      }

      .timing-title {
        max-width: 92%;
      }

      .countdown {
        margin-top: 10px;
      }

      .count-item {
        padding: 10px 6px;
      }

      .form-card {
        padding: 22px 14px 28px;
      }

      .field {
        height: 64px;
        font-size: 20px;
      }

      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Музыка -->
  <audio id="bgMusic" preload="auto" loop>
    <source src="Music%20.m4a" type="audio/mp4" />
  </audio>

  <!-- Заставка -->
  <section class="intro" id="intro">
    <div class="flower left-top" aria-hidden="true">
      <svg viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M72 90 C 38 138, 26 175, 28 218" fill="none" stroke="#7d9164" stroke-width="5" stroke-linecap="round"/>
        <path d="M92 16 C124 12, 143 35, 134 67 C127 93, 98 106, 75 93 C55 82, 52 49, 70 27 C75 21, 82 18, 92 16 Z" fill="#fbfbf7"/>
      </svg>
    </div>

    <div class="flower right-top" aria-hidden="true">
      <svg viewBox="0 0 170 240" xmlns="http://www.w3.org/2000/svg">
        <path d="M96 94 C 128 142, 141 183, 139 235" fill="none" stroke="#7d9164" stroke-width="5" stroke-linecap="round"/>
        <path d="M78 14 C44 12, 24 33, 32 68 C40 95, 68 108, 92 94 C111 83, 117 49, 100 27 C95 20, 89 17, 78 14 Z" fill="#fbfbf7"/>
      </svg>
    </div>

    <div class="flower left-bottom" aria-hidden="true">
      <svg viewBox="0 0 180 240" xmlns="http://www.w3.org/2000/svg">
        <path d="M120 18 C 88 62, 58 128, 38 230" fill="none" stroke="#7d9164" stroke-width="5" stroke-linecap="round"/>
        <path d="M130 10 C160 22, 172 51, 156 78 C142 101, 113 105, 92 91 C72 78, 71 48, 91 27 C102 16, 115 11, 130 10 Z" fill="#fbfbf7"/>
      </svg>
    </div>

    <div class="flower right-bottom" aria-hidden="true">
      <svg viewBox="0 0 170 230" xmlns="http://www.w3.org/2000/svg">
        <path d="M44 18 C 80 64, 113 129, 133 220" fill="none" stroke="#7d9164" stroke-width="5" stroke-linecap="round"/>
        <path d="M38 10 C12 22, 1 49, 14 75 C28 99, 56 103, 78 92 C99 81, 102 49, 83 28 C72 16, 56 10, 38 10 Z" fill="#fbfbf7"/>
      </svg>
    </div>

    <div class="intro-inner" id="introOpen">
      <h1 class="intro-title">Любовь никогда<br>не перестаёт</h1>
      <div class="intro-sub">нажми, чтобы открыть</div>
    </div>
  </section>

  <div class="music-note" id="musicNote">Музыка включена</div>

  <main class="site" id="site">
    <!-- 1 -->
    <section class="section-image">
      <img src="Foto1.PNG" alt="Первый экран" />
    </section>

    <!-- 2 -->
    <section class="section-image">
      <img src="Foto2.PNG" alt="Второй экран" />
    </section>

    <!-- 3 -->
    <section class="section-image">
      <img src="Foto3.PNG" alt="Третий экран" />
    </section>

    <!-- Таймер -->
    <section class="timing-section">
      <div class="timing-overlay">
        <h2 class="timing-title">До того, как мы станем семьёй, осталось...</h2>

        <div class="countdown" aria-label="Таймер до свадьбы">
          <div class="count-item">
            <div class="count-num" id="days">00</div>
            <div class="count-label">дней</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="hours">00</div>
            <div class="count-label">часов</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="minutes">00</div>
            <div class="count-label">минут</div>
          </div>
          <div class="count-item">
            <div class="count-num" id="seconds">00</div>
            <div class="count-label">секунд</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 4 -->
    <section class="section-image">
      <img src="Foto4.jpg" alt="Четвёртый экран" />
    </section>

    <!-- Анкета + группа -->
    <section class="blue-wrap">
      <div class="form-section">
        <h2 class="form-title">Анкета Гостя !</h2>

        <div class="form-card">
          <form onsubmit="return false;">
            <input class="field" type="text" placeholder="Имя" />

            <div class="radio-row">
              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Да</span>
              </label>

              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Нет</span>
              </label>
            </div>

            <input class="field" type="number" min="1" placeholder="Количество" />

            <button class="submit-btn" type="button">Отправить</button>
          </form>
        </div>
      </div>

      <div class="group-section">
        <h2 class="group-title">Общая группа</h2>
        <a class="group-link" href="javascript:void(0)">Перейти в Telegram</a>
      </div>
    </section>
  </main>

  <script>
    const intro = document.getElementById("intro");
    const site = document.getElementById("site");
    const bgMusic = document.getElementById("bgMusic");
    const musicNote = document.getElementById("musicNote");

    let opened = false;

    function openSite() {
      if (opened) return;
      opened = true;

      intro.classList.add("hide");
      site.classList.add("show");

      bgMusic.play()
        .then(() => {
          musicNote.classList.add("show");
          setTimeout(() => musicNote.classList.remove("show"), 2200);
        })
        .catch(() => {
          console.log("Автовоспроизведение заблокировано браузером.");
        });
    }

    intro.addEventListener("click", openSite);
    intro.addEventListener("touchstart", openSite, { passive: true });

    // Таймер до 2 мая 2026, 10:00
    const weddingDate = new Date("2026-05-02T10:00:00");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const diff = weddingDate - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
