<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Denis & Viktoriia</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap');

    :root {
      --bg-main: #EBEBEB;
      --bg-blue: #92A4BD;
      --text-dark: #111111;
      --text-soft: rgba(17, 17, 17, 0.68);
      --white: #ffffff;
      --line: rgba(17, 17, 17, 0.24);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-dark);
      font-family: "Times New Roman", Georgia, serif;
      overflow-x: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    button,
    input {
      font: inherit;
    }

    .site {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1s ease, transform 1s ease;
      pointer-events: none;
    }

    .site.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Заставка */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 1s ease, visibility 1s ease, filter 1s ease;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,0.18), transparent 28%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.10), transparent 35%);
      animation: introGlow 7s ease-in-out infinite alternate;
      z-index: 0;
      pointer-events: none;
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      filter: blur(10px);
    }

    .intro-inner {
      position: relative;
      z-index: 4;
      width: 100%;
      max-width: 900px;
      padding: 24px;
      text-align: center;
    }

    .intro-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(46px, 7.8vw, 90px);
      line-height: 0.95;
      letter-spacing: 0.01em;
      font-weight: 500;
      color: #111;
      opacity: 0;
      transform: translateY(22px);
      text-wrap: balance;
      animation: titleRise 1.5s ease forwards 0.45s;
      text-shadow: 0 1px 0 rgba(255,255,255,0.12);
    }

    .flower {
      position: absolute;
      z-index: 2;
      opacity: 0;
      animation: flowerFade 1.8s ease forwards;
      will-change: transform, opacity;
      pointer-events: none;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.08));
    }

    .flower img {
      width: 100%;
      height: auto;
      display: block;
    }

    .flower.f1 {
      width: min(34vw, 280px);
      top: -2%;
      right: -5%;
      animation-delay: 0.15s;
    }

    .flower.f2 {
      width: min(32vw, 260px);
      bottom: -3%;
      left: -6%;
      animation-delay: 0.45s;
    }

    .flower.f3 {
      width: min(26vw, 220px);
      top: 8%;
      left: -4%;
      animation-delay: 0.75s;
    }

    .flower.f4 {
      width: min(24vw, 210px);
      bottom: 8%;
      right: -3%;
      animation-delay: 1.0s;
    }

    .flower.f5 {
      width: min(18vw, 150px);
      top: 50%;
      right: 6%;
      transform: translateY(-50%);
      opacity: 0;
      animation-delay: 1.25s;
    }

    @keyframes titleRise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes flowerFade {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(0.92);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes introGlow {
      0% {
        opacity: 0.65;
        transform: scale(1);
      }
      100% {
        opacity: 1;
        transform: scale(1.03);
      }
    }

    /* Секции */
    .section-image {
      width: 100%;
      background: var(--bg-main);
    }

    .section-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Таймер */
    .timing-wrap {
      background: var(--bg-main);
      padding: 18px 12px 8px;
    }

    .timing-card {
      position: relative;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #d7d7d7;
    }

    .timing-image {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 260px;
      max-height: 420px;
      background:
        linear-gradient(rgba(235,235,235,0.06), rgba(235,235,235,0.12)),
        url("Taiming.jpg") center 44% / cover no-repeat;
    }

    .timing-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(235,235,235,0.12) 0%,
        rgba(235,235,235,0.03) 35%,
        rgba(235,235,235,0.08) 100%
      );
      pointer-events: none;
    }

    .timing-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 24px 18px 16px;
    }

    .timing-title {
      margin: 0;
      max-width: 760px;
      font-size: clamp(28px, 4.5vw, 50px);
      line-height: 1.05;
      font-weight: 400;
      color: #111;
      opacity: 0;
      transform: translateY(12px);
      animation: softText 0.9s ease forwards 0.4s;
      text-shadow: 0 1px 0 rgba(255,255,255,0.08);
    }

    .countdown {
      width: 100%;
      max-width: 760px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      margin-top: 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: softText 0.9s ease forwards 0.75s;
    }

    .count-item {
      position: relative;
      padding: 4px 8px;
    }

    .count-item:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 16%;
      height: 68%;
      width: 1.5px;
      background: rgba(17,17,17,0.24);
    }

    .count-num {
      font-size: clamp(34px, 6vw, 66px);
      line-height: 1;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .count-label {
      font-size: clamp(14px, 2.2vw, 22px);
      letter-spacing: 0.02em;
      color: rgba(17,17,17,0.88);
    }

    @keyframes softText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Синий блок */
    .blue-wrap {
      background: var(--bg-blue);
      padding: 42px 18px 56px;
    }

    .form-section {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .form-title,
    .group-title {
      margin: 0 0 26px;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 400;
      color: #111;
    }

    .form-card {
      background: rgba(255,255,255,0.34);
      border-radius: 34px;
      padding: 26px 18px 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .field {
      width: 100%;
      height: 68px;
      border-radius: 24px;
      border: 1.6px solid rgba(17,17,17,0.22);
      background: rgba(255,255,255,0.20);
      padding: 0 22px;
      font-size: 22px;
      color: #111;
      outline: none;
      margin-bottom: 22px;
    }

    .field::placeholder {
      color: rgba(17,17,17,0.42);
    }

    .radio-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px;
      margin: 8px 0 22px;
      flex-wrap: wrap;
    }

    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: #111;
    }

    .radio-label input[type="radio"] {
      width: 28px;
      height: 28px;
      accent-color: #ffffff;
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 6px;
      min-width: 220px;
      height: 68px;
      padding: 0 32px;
      border: none;
      border-radius: 999px;
      background: #496e9f;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }

    .group-section {
      max-width: 860px;
      margin: 48px auto 0;
      text-align: center;
    }

    .group-link {
      display: inline-block;
      color: rgba(255,255,255,0.95);
      text-decoration: none;
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.3;
      opacity: 0.96;
      pointer-events: none;
      cursor: default;
    }

    .music-note {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 50;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: #111;
      font-size: 13px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .music-note.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 740px) {
      .intro-title {
        font-size: clamp(44px, 8.8vw, 72px);
        line-height: 0.98;
        padding: 0 12px;
      }

      .flower.f1 {
        width: 170px;
        top: -1%;
        right: -7%;
      }

      .flower.f2 {
        width: 185px;
        left: -8%;
        bottom: -2%;
      }

      .flower.f3 {
        width: 130px;
        top: 10%;
        left: -5%;
      }

      .flower.f4 {
        width: 120px;
        right: -4%;
        bottom: 12%;
      }

      .flower.f5 {
        width: 100px;
        right: 2%;
        top: 52%;
      }

      .timing-wrap {
        padding: 14px 10px 8px;
      }

      .timing-card {
        border-radius: 24px;
      }

      .timing-image {
        aspect-ratio: 1.55 / 1;
        min-height: 220px;
        max-height: none;
        background-position: center 42%;
      }

      .timing-overlay {
        padding: 18px 10px 12px;
      }

      .timing-title {
        max-width: 96%;
        font-size: clamp(20px, 5.4vw, 30px);
      }

      .countdown {
        margin-top: 18px;
      }

      .count-item {
        padding: 4px 3px;
      }

      .count-num {
        font-size: clamp(24px, 7vw, 40px);
      }

      .count-label {
        font-size: 12px;
      }

      .form-card {
        padding: 22px 14px 28px;
      }

      .field {
        height: 64px;
        font-size: 20px;
      }

      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" preload="auto" loop>
    <source src="Music%20.m4a" type="audio/mp4" />
  </audio>

  <section class="intro" id="intro">
    <div class="flower f1"><img src="Flower1.jpg" alt="" /></div>
    <div class="flower f2"><img src="Flower2.jpg" alt="" /></div>
    <div class="flower f3"><img src="Flower3.jpg" alt="" /></div>
    <div class="flower f4"><img src="Flower4.jpg" alt="" /></div>
    <div class="flower f5"><img src="Flower5.jpg" alt="" /></div>

    <div class="intro-inner">
      <h1 class="intro-title">Любовь никогда<br>не перестаёт</h1>
    </div>
  </section>

  <div class="music-note" id="musicNote">Музыка включена</div>

  <main class="site" id="site">
    <section class="section-image reveal">
      <img src="Foto1.PNG" alt="Первый экран" />
    </section>

    <section class="section-image reveal">
      <img src="Foto2.PNG" alt="Второй экран" />
    </section>

    <section class="section-image reveal">
      <img src="Foto3.PNG" alt="Третий экран" />
    </section>

    <section class="timing-wrap reveal">
      <div class="timing-card">
        <div class="timing-image">
          <div class="timing-overlay">
            <h2 class="timing-title">До того, как мы станем семьёй, осталось...</h2>

            <div class="countdown" aria-label="Таймер до свадьбы">
              <div class="count-item">
                <div class="count-num" id="days">00</div>
                <div class="count-label">дней</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="hours">00</div>
                <div class="count-label">часов</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="minutes">00</div>
                <div class="count-label">минут</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="seconds">00</div>
                <div class="count-label">секунд</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-image reveal">
      <img src="Foto4.jpg" alt="Четвёртый экран" />
    </section>

    <section class="blue-wrap reveal">
      <div class="form-section">
        <h2 class="form-title">Анкета Гостя !</h2>

        <div class="form-card">
          <form onsubmit="return false;">
            <input class="field" type="text" placeholder="Имя" />

            <div class="radio-row">
              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Да</span>
              </label>

              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Нет</span>
              </label>
            </div>

            <input class="field" type="number" min="1" placeholder="Количество" />

            <button class="submit-btn" type="button">Отправить</button>
          </form>
        </div>
      </div>

      <div class="group-section">
        <h2 class="group-title">Общая группа</h2>
        <a class="group-link" href="javascript:void(0)">Перейти в Telegram</a>
      </div>
    </section>
  </main>

  <script>
    const intro = document.getElementById("intro");
    const site = document.getElementById("site");
    const bgMusic = document.getElementById("bgMusic");
    const musicNote = document.getElementById("musicNote");

    let opened = false;

    function openSite() {
      if (opened) return;
      opened = true;

      intro.classList.add("hide");
      site.classList.add("show");

      bgMusic.play()
        .then(() => {
          musicNote.classList.add("show");
          setTimeout(() => musicNote.classList.remove("show"), 2200);
        })
        .catch(() => {
          console.log("Запуск музыки ограничен браузером.");
        });
    }

    intro.addEventListener("click", openSite);
    intro.addEventListener("touchstart", openSite, { passive: true });

    const weddingDate = new Date("2026-05-02T10:00:00");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const diff = weddingDate - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
