<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Denis & Viktoriia</title>

  <style>
    :root {
      --bg-main: #EBEBEB;
      --bg-blue: #92A4BD;
      --text-dark: #111111;
      --text-soft: rgba(17, 17, 17, 0.7);
      --white: #ffffff;
      --line: rgba(17, 17, 17, 0.25);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --radius-lg: 30px;
      --radius-md: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-dark);
      font-family: "Times New Roman", Georgia, serif;
      overflow-x: hidden;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    button,
    input {
      font: inherit;
    }

    .site {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1.1s ease, transform 1.1s ease;
      pointer-events: none;
    }

    .site.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Intro */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 1s ease, visibility 1s ease, filter 1s ease;
    }

    .intro::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 35%, rgba(255,255,255,0.55), transparent 28%),
        radial-gradient(circle at 70% 62%, rgba(255,255,255,0.35), transparent 24%);
      animation: introGlow 7s ease-in-out infinite alternate;
      z-index: 0;
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      filter: blur(10px);
    }

    .intro-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 900px;
      padding: 24px;
      text-align: center;
    }

    .intro-title {
      font-size: clamp(38px, 7vw, 74px);
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: var(--text-dark);
      margin: 0;
      font-weight: 400;
      opacity: 0;
      transform: translateY(20px);
      animation: titleRise 1.6s ease forwards 0.45s;
    }

    @keyframes titleRise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes introGlow {
      0% {
        transform: scale(1) translateY(0);
        opacity: 0.9;
      }
      100% {
        transform: scale(1.05) translateY(-8px);
        opacity: 1;
      }
    }

    /* Flowers */
    .calla {
      position: absolute;
      z-index: 2;
      opacity: 0;
      animation: flowerAppear 1.8s ease forwards;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,0.06));
    }

    .calla svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .calla.lt {
      width: 210px;
      top: -12px;
      left: -32px;
      transform-origin: bottom right;
      animation-delay: 0.15s;
    }

    .calla.rt {
      width: 250px;
      top: -14px;
      right: -34px;
      transform-origin: bottom left;
      animation-delay: 0.5s;
    }

    .calla.lb {
      width: 230px;
      left: -32px;
      bottom: -18px;
      transform-origin: top right;
      animation-delay: 0.9s;
    }

    .calla.rb {
      width: 210px;
      right: -26px;
      bottom: -10px;
      transform-origin: top left;
      animation-delay: 1.2s;
    }

    @keyframes flowerAppear {
      0% {
        opacity: 0;
        transform: scale(0.82) translateY(30px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Main sections */
    .section-image {
      width: 100%;
      background: var(--bg-main);
    }

    .section-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Timing section */
    .timing-wrap {
      background: var(--bg-main);
      padding: 26px 14px 12px;
    }

    .timing-card {
      position: relative;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #d9d9d9;
    }

    .timing-image {
      position: relative;
      min-height: 520px;
      background:
        linear-gradient(rgba(235,235,235,0.10), rgba(235,235,235,0.16)),
        url("Taiming.jpg") center center / cover no-repeat;
    }

    .timing-image::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(235,235,235,0.14) 0%,
        rgba(235,235,235,0.04) 35%,
        rgba(235,235,235,0.08) 100%
      );
      pointer-events: none;
    }

    .timing-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 28px 16px 22px;
    }

    .timing-title {
      margin: 0;
      max-width: 620px;
      font-size: clamp(24px, 5.2vw, 44px);
      line-height: 1.16;
      font-weight: 400;
      color: #111;
      text-shadow: 0 1px 0 rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(18px);
      animation: softText 1s ease forwards 0.5s;
    }

    .countdown {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      margin-top: 34px;
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      animation: softText 1s ease forwards 0.9s;
    }

    .count-item {
      position: relative;
      padding: 6px 8px;
    }

    .count-item:not(:last-child)::after {
      content: "";
      position: absolute;
      right: 0;
      top: 16%;
      height: 68%;
      width: 1.5px;
      background: rgba(17,17,17,0.26);
    }

    .count-num {
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .count-label {
      font-size: clamp(14px, 2.8vw, 22px);
      letter-spacing: 0.02em;
      color: rgba(17,17,17,0.88);
    }

    @keyframes softText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Blue section */
    .blue-wrap {
      background: var(--bg-blue);
      padding: 42px 18px 56px;
    }

    .form-section {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .form-title {
      margin: 0 0 26px;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 400;
      color: #111;
    }

    .form-card {
      background: rgba(255,255,255,0.34);
      border-radius: 34px;
      padding: 26px 18px 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .field {
      width: 100%;
      height: 68px;
      border-radius: 24px;
      border: 1.6px solid rgba(17,17,17,0.22);
      background: rgba(255,255,255,0.20);
      padding: 0 22px;
      font-size: 22px;
      color: #111;
      outline: none;
      margin-bottom: 22px;
    }

    .field::placeholder {
      color: rgba(17,17,17,0.42);
    }

    .radio-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px;
      margin: 8px 0 22px;
      flex-wrap: wrap;
    }

    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      color: #111;
    }

    .radio-label input[type="radio"] {
      width: 28px;
      height: 28px;
      accent-color: #ffffff;
      cursor: pointer;
    }

    .submit-btn {
      margin-top: 6px;
      min-width: 220px;
      height: 68px;
      padding: 0 32px;
      border: none;
      border-radius: 999px;
      background: #496e9f;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
    }

    .group-section {
      max-width: 860px;
      margin: 48px auto 0;
      text-align: center;
    }

    .group-title {
      margin: 0 0 16px;
      font-size: clamp(34px, 8vw, 62px);
      font-weight: 400;
      color: #111;
    }

    .group-link {
      display: inline-block;
      color: rgba(255,255,255,0.95);
      text-decoration: none;
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.3;
      opacity: 0.96;
      pointer-events: none;
      cursor: default;
    }

    /* Music pill */
    .music-note {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 50;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: #111;
      font-size: 13px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    .music-note.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 740px) {
      .calla.lt {
        width: 170px;
        top: -8px;
        left: -28px;
      }

      .calla.rt {
        width: 195px;
        top: -10px;
        right: -28px;
      }

      .calla.lb {
        width: 180px;
        left: -28px;
        bottom: -18px;
      }

      .calla.rb {
        width: 165px;
        right: -22px;
        bottom: -8px;
      }

      .timing-wrap {
        padding: 18px 10px 6px;
      }

      .timing-card {
        max-width: 100%;
        border-radius: 20px;
      }

      .timing-image {
        min-height: 410px;
        background-position: center center;
      }

      .timing-overlay {
        padding: 22px 12px 18px;
      }

      .timing-title {
        max-width: 94%;
        font-size: clamp(21px, 6vw, 34px);
      }

      .countdown {
        margin-top: 20px;
      }

      .count-item {
        padding: 4px 4px;
      }

      .count-num {
        font-size: clamp(27px, 7vw, 48px);
      }

      .count-label {
        font-size: 12px;
      }

      .form-card {
        padding: 22px 14px 28px;
      }

      .field {
        height: 64px;
        font-size: 20px;
      }

      .submit-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <audio id="bgMusic" preload="auto" loop>
    <source src="Music%20.m4a" type="audio/mp4" />
  </audio>

  <section class="intro" id="intro">
    <div class="calla lt" aria-hidden="true">
      <svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
        <path d="M62 272 C 60 206, 78 138, 128 74" fill="none" stroke="#90a172" stroke-width="8" stroke-linecap="round"/>
        <path d="M135 32 C 173 16, 214 31, 221 67 C 227 101, 205 130, 170 138 C 140 145, 114 128, 106 99 C 96 63, 106 44, 135 32 Z" fill="#f7f7f1"/>
        <path d="M150 56 C 162 70, 170 86, 170 102" fill="none" stroke="#d8c95f" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="calla rt" aria-hidden="true">
      <svg viewBox="0 0 250 300" xmlns="http://www.w3.org/2000/svg">
        <path d="M186 286 C 189 213, 173 139, 122 68" fill="none" stroke="#90a172" stroke-width="8" stroke-linecap="round"/>
        <path d="M118 26 C 79 11, 39 29, 30 67 C 22 103, 45 135, 83 144 C 114 151, 141 133, 149 100 C 158 60, 149 40, 118 26 Z" fill="#f7f7f1"/>
        <path d="M102 53 C 91 68, 84 84, 82 100" fill="none" stroke="#d8c95f" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="calla lb" aria-hidden="true">
      <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
        <path d="M164 18 C 118 79, 85 159, 62 290" fill="none" stroke="#90a172" stroke-width="8" stroke-linecap="round"/>
        <path d="M171 20 C 209 33, 229 67, 219 102 C 210 136, 179 156, 145 149 C 114 142, 96 117, 97 87 C 98 48, 127 25, 171 20 Z" fill="#f7f7f1"/>
        <path d="M170 53 C 180 67, 186 83, 186 99" fill="none" stroke="#d8c95f" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="calla rb" aria-hidden="true">
      <svg viewBox="0 0 230 290" xmlns="http://www.w3.org/2000/svg">
        <path d="M64 18 C 108 78, 141 154, 163 280" fill="none" stroke="#90a172" stroke-width="8" stroke-linecap="round"/>
        <path d="M58 18 C 22 33, 4 67, 12 100 C 20 133, 49 153, 82 147 C 114 141, 134 116, 134 84 C 133 46, 104 24, 58 18 Z" fill="#f7f7f1"/>
        <path d="M59 52 C 49 67, 43 83, 43 97" fill="none" stroke="#d8c95f" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="intro-inner">
      <h1 class="intro-title">Любовь никогда<br>не перестаёт</h1>
    </div>
  </section>

  <div class="music-note" id="musicNote">Музыка включена</div>

  <main class="site" id="site">
    <section class="section-image reveal">
      <img src="Foto1.PNG" alt="Первый экран" />
    </section>

    <section class="section-image reveal">
      <img src="Foto2.PNG" alt="Второй экран" />
    </section>

    <section class="section-image reveal">
      <img src="Foto3.PNG" alt="Третий экран" />
    </section>

    <section class="timing-wrap reveal">
      <div class="timing-card">
        <div class="timing-image">
          <div class="timing-overlay">
            <h2 class="timing-title">До того, как мы станем семьёй, осталось...</h2>

            <div class="countdown" aria-label="Таймер до свадьбы">
              <div class="count-item">
                <div class="count-num" id="days">00</div>
                <div class="count-label">дней</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="hours">00</div>
                <div class="count-label">часов</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="minutes">00</div>
                <div class="count-label">минут</div>
              </div>
              <div class="count-item">
                <div class="count-num" id="seconds">00</div>
                <div class="count-label">секунд</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-image reveal">
      <img src="Foto4.jpg" alt="Четвёртый экран" />
    </section>

    <section class="blue-wrap reveal">
      <div class="form-section">
        <h2 class="form-title">Анкета Гостя !</h2>

        <div class="form-card">
          <form onsubmit="return false;">
            <input class="field" type="text" placeholder="Имя" />

            <div class="radio-row">
              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Да</span>
              </label>

              <label class="radio-label">
                <input type="radio" name="attendance" />
                <span>Нет</span>
              </label>
            </div>

            <input class="field" type="number" min="1" placeholder="Количество" />

            <button class="submit-btn" type="button">Отправить</button>
          </form>
        </div>
      </div>

      <div class="group-section">
        <h2 class="group-title">Общая группа</h2>
        <a class="group-link" href="javascript:void(0)">Перейти в Telegram</a>
      </div>
    </section>
  </main>

  <script>
    const intro = document.getElementById("intro");
    const site = document.getElementById("site");
    const bgMusic = document.getElementById("bgMusic");
    const musicNote = document.getElementById("musicNote");

    let opened = false;

    function openSite() {
      if (opened) return;
      opened = true;

      intro.classList.add("hide");
      site.classList.add("show");

      bgMusic.play()
        .then(() => {
          musicNote.classList.add("show");
          setTimeout(() => musicNote.classList.remove("show"), 2200);
        })
        .catch(() => {
          console.log("Запуск музыки ограничен браузером.");
        });
    }

    intro.addEventListener("click", openSite);
    intro.addEventListener("touchstart", openSite, { passive: true });

    const weddingDate = new Date("2026-05-02T10:00:00");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const diff = weddingDate - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
        }
      });
    }, {
      threshold: 0.12
    });

    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
  </script>
</body>
</html>
